spring.application.name=invoice-api

# ===============================
# PostgreSQL Configuration
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/sap_invoices}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# RabbitMQ Configuration
# ===============================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:password}

# ===============================
# Azurite (Local Azure Storage)
# ===============================
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;}
azure.storage.public-host=${AZURE_STORAGE_PUBLIC_HOST:127.0.0.1}

# ===============================
# Clerk JWT Configuration (FIX: these were missing entirely)
#
# clerk.jwks-url  — Clerk's public key endpoint. Replace YOUR_CLERK_DOMAIN
#   with the value shown in Clerk Dashboard → API Keys → Advanced.
#   Format: https://<your-app>.clerk.accounts.dev
#   Example: https://harmless-cat-12.clerk.accounts.dev/.well-known/jwks.json
#
# clerk.issuer  — Must exactly match the "iss" claim in Clerk's JWTs.
#   It's the same domain without the path:
#   Example: https://harmless-cat-12.clerk.accounts.dev
#
# cors.allowed-origins  — Comma-separated list of frontend origins.
#   Add your production URL here when you deploy.
# ===============================
clerk.jwks-url=https://clerk.invoiceflow.com/.well-known/jwks.json
clerk.issuer=https://clerk.invoiceflow.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
# ===============================
# SAP S/4HANA Integration
# sap.base-url: Postman Mock URL for local dev, real S/4HANA OData URL for prod
# sap.api-key:  Leave blank for Postman mock; set to your SAP API Hub key for prod
# ===============================
sap.base-url=${SAP_BASE_URL:https://db94f59f-1d13-4c39-83d9-ceb89e203c31.mock.pstmn.io}
sap.api-path=${SAP_API_PATH:/sap/opu/odata/sap/API_SUPPLIERINVOICE_PROCESS_SRV/A_SupplierInvoice}
sap.api-key=${SAP_API_KEY:}