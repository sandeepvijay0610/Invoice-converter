services:
  # 1. The Message Broker (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: sap-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 3

  # 2. The Database (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: sap-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sap_invoices
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sap_invoices"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Local Azure Storage Emulator (Azurite)
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: sap-azurite
    hostname: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: "azurite --loose --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --skipApiVersionCheck"

  # 4. Spring Boot API
  invoice-api:
    build:
      context: ../invoice-api
      dockerfile: Dockerfile
    container_name: sap-invoice-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sap_invoices
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: password
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      AZURE_STORAGE_PUBLIC_HOST: "127.0.0.1"
      # Clerk JWT verification — get your domain from Clerk Dashboard → API Keys → Advanced
      # It looks like: https://your-app.clerk.accounts.dev  (dev)
      # or: https://clerk.yourdomain.com  (prod)
      CLERK_JWKS_URL: "https://promoted-mackerel-0.clerk.accounts.dev/.well-known/jwks.json"
      CLERK_ISSUER: "https://promoted-mackerel-0.clerk.accounts.dev"
      SAP_BASE_URL: "https://db94f59f-1d13-4c39-83d9-ceb89e203c31.mock.pstmn.io"
      SAP_API_PATH: "/sap/opu/odata/sap/API_SUPPLIERINVOICE_PROCESS_SRV/A_SupplierInvoice"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started

  # 5. AI Worker(s)
  # Scale with: docker compose up --scale ai-worker=3
  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: sap-invoice-pipeline
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o}
      - MODEL_PROVIDER=${MODEL_PROVIDER}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME:-gemini-2.0-flash}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=password
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=password
      - DB_NAME=sap_invoices
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      - BLOB_CONTAINER_NAME=invoices
    volumes:
      - ./data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started

volumes:
  pgdata:
  azurite-data: